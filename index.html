<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            padding-top: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            touch-action: pan-y;
        }

        .game-wrapper {
            width: 100%;
            max-width: 675px;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            gap: 10px;
        }

        .left-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .score-board {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            font-size: 26px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 6px 18px rgba(102, 126, 234, 0.4);
        }

        .progress-info {
            background: rgba(255, 255, 255, 0.85);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            color: #1976D2;
            text-align: left;
            border: 2px solid #64B5F6;
            box-shadow: 0 3px 10px rgba(100, 181, 246, 0.3);
            line-height: 1.5;
        }

        .cute-hint-box {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', 'Microsoft YaHei', cursive;
            font-size: 13px;
            color: #1976D2;
            line-height: 1.6;
            text-align: left;
            padding: 10px 16px;
            background: rgba(227, 242, 253, 0.9);
            border: 2px solid #64B5F6;
            border-radius: 15px;
            box-shadow: 0 4px 12px rgba(100, 181, 246, 0.35);
            flex-shrink: 0;
            max-width: 200px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 675px;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            background: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 100%);
        }

        .instructions {
            margin-top: 15px;
            color: #555;
            font-size: 13px;
            text-align: center;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 35px 50px;
            border-radius: 30px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: popIn 0.3s ease-out;
            max-width: 90%;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .game-over-content h2 {
            font-size: 32px;
            margin-bottom: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-over-content p {
            font-size: 22px;
            margin-bottom: 28px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(56, 239, 125, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(56, 239, 125, 0.6);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header-section">
            <div class="left-section">
                <div class="score-board">分数：<span id="score">0</span></div>
                <div class="progress-info">
                    已吃：<span id="totalEaten">0</span> 个<br>
                    下次换头还需：<span id="nextHeadProgress">5</span> 个
                </div>
            </div>
            <div class="cute-hint-box">
                吃掉更多小十一<br>
                梓梓的表情<br>
                会越来越开心噢！
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="675" height="675"></canvas>
        </div>

        <div class="instructions">电脑使用方向键 ↑↓←→ 控制 · 手机滑动屏幕操控</div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h2>游戏结束！</h2>
            <p>最终分数：<span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const totalEatenElement = document.getElementById('totalEaten');
        const nextHeadProgressElement = document.getElementById('nextHeadProgress');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverOverlay = document.getElementById('gameOverOverlay');

        const BASE_CANVAS_SIZE = 675;
        const BASE_GRID_SIZE = 45;
        let gridSize = BASE_GRID_SIZE;
        let tileCount = BASE_CANVAS_SIZE / BASE_GRID_SIZE;

        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameLoop;
        let isGameOver = false;
        let scaleFactor = 1;

        let currentLevelIndex = 0;
        const HEAD_IMAGES = [
            'image/01.png',
            'image/02.png',
            'image/03.png',
            'image/04.png',
            'image/05.png',
            'image/06.png',
            'image/07.png'
        ];

        function getRequiredFoodForNextLevel(levelIndex) {
            return 5 + levelIndex * 2;
        }

        let foodEatenSinceLastUpgrade = 0;
        let requiredFoodForNextUpgrade = getRequiredFoodForNextLevel(currentLevelIndex);

        const INITIAL_GAME_SPEED = 270;
        const MIN_GAME_SPEED = 90;
        const SPEED_DECREASE_AMOUNT = 22;
        let gameSpeed = INITIAL_GAME_SPEED;

        function resizeCanvas() {
            const container = canvas.parentElement;
            const containerWidth = container.clientWidth;

            if (containerWidth < BASE_CANVAS_SIZE) {
                scaleFactor = containerWidth / BASE_CANVAS_SIZE;
                canvas.style.width = containerWidth + 'px';
                canvas.style.height = containerWidth + 'px';
                gridSize = BASE_GRID_SIZE * scaleFactor;
            } else {
                scaleFactor = 1;
                canvas.style.width = BASE_CANVAS_SIZE + 'px';
                canvas.style.height = BASE_CANVAS_SIZE + 'px';
                gridSize = BASE_GRID_SIZE;
            }
        }

        function updateProgressDisplay() {
            totalEatenElement.textContent = score;
            nextHeadProgressElement.textContent = requiredFoodForNextUpgrade - foodEatenSinceLastUpgrade;
        }

        function initGame() {
            snake = [
                { x: 4, y: 7 },
                { x: 3, y: 7 },
                { x: 2, y: 7 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = INITIAL_GAME_SPEED;
            isGameOver = false;
            
            currentLevelIndex = 0;
            foodEatenSinceLastUpgrade = 0;
            requiredFoodForNextUpgrade = getRequiredFoodForNextLevel(currentLevelIndex);

            scoreElement.textContent = score;
            updateProgressDisplay();
            gameOverOverlay.style.display = 'none';
            placeFood();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function getCurrentHeadImage() {
            const maxLevelIndex = HEAD_IMAGES.length - 1;
            const effectiveLevelIndex = Math.min(currentLevelIndex, maxLevelIndex);
            return HEAD_IMAGES[effectiveLevelIndex];
        }

        function drawRoundedRect(x, y, width, height, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x, y, width, height, radius);
            ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, BASE_CANVAS_SIZE, BASE_CANVAS_SIZE);

            ctx.strokeStyle = 'rgba(144, 202, 249, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BASE_GRID_SIZE, 0);
                ctx.lineTo(i * BASE_GRID_SIZE, BASE_CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * BASE_GRID_SIZE);
                ctx.lineTo(BASE_CANVAS_SIZE, i * BASE_GRID_SIZE);
                ctx.stroke();
            }

            snake.forEach((segment, index) => {
                const x = segment.x * BASE_GRID_SIZE;
                const y = segment.y * BASE_GRID_SIZE;

                if (index === 0) {
                    const headImg = new Image();
                    headImg.src = getCurrentHeadImage();

                    if (headImg.complete) {
                        ctx.drawImage(headImg, x, y, BASE_GRID_SIZE, BASE_GRID_SIZE);
                    } else {
                        headImg.onload = () => {
                            if (!isGameOver) ctx.drawImage(headImg, x, y, BASE_GRID_SIZE, BASE_GRID_SIZE);
                        };
                        drawRoundedRect(x + 1, y + 1, BASE_GRID_SIZE - 2, BASE_GRID_SIZE - 2, 8, '#1976D2');
                    }
                } else {
                    const bodySize = 42;
                    const offset = (BASE_GRID_SIZE - bodySize) / 2;
                    const gradient = ctx.createLinearGradient(x, y, x + BASE_GRID_SIZE, y + BASE_GRID_SIZE);
                    gradient.addColorStop(0, '#42A5F5');
                    gradient.addColorStop(1, '#1E88E5');

                    drawRoundedRect(x + offset, y + offset, bodySize, bodySize, 6, gradient);

                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.beginPath();
                    ctx.roundRect(x + offset + 2, y + offset + 2, bodySize / 3, bodySize / 3, 3);
                    ctx.fill();
                }
            });

            const foodImg = new Image();
            foodImg.src = 'image/08.png';
            const foodSize = 42;
            const foodOffset = (BASE_GRID_SIZE - foodSize) / 2;

            if (foodImg.complete) {
                ctx.drawImage(foodImg, food.x * BASE_GRID_SIZE + foodOffset, food.y * BASE_GRID_SIZE + foodOffset, foodSize, foodSize);
            } else {
                foodImg.onload = () => {
                    if (!isGameOver) ctx.drawImage(foodImg, food.x * BASE_GRID_SIZE + foodOffset, food.y * BASE_GRID_SIZE + foodOffset, foodSize, foodSize);
                };

                ctx.fillStyle = '#FF5722';
                ctx.beginPath();
                ctx.arc(food.x * BASE_GRID_SIZE + BASE_GRID_SIZE / 2, food.y * BASE_GRID_SIZE + BASE_GRID_SIZE / 2, foodSize / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function checkAndUpgradeSnakeHead() {
            if (foodEatenSinceLastUpgrade >= requiredFoodForNextUpgrade) {
                const maxLevelIndex = HEAD_IMAGES.length - 1;
                
                if (currentLevelIndex < maxLevelIndex) {
                    currentLevelIndex++;
                    foodEatenSinceLastUpgrade = 0;
                    requiredFoodForNextUpgrade = getRequiredFoodForNextLevel(currentLevelIndex);

                    if (gameSpeed > MIN_GAME_SPEED) {
                        gameSpeed = Math.max(MIN_GAME_SPEED, gameSpeed - SPEED_DECREASE_AMOUNT);
                        clearInterval(gameLoop);
                        gameLoop = setInterval(gameStep, gameSpeed);
                    }
                } else {
                    foodEatenSinceLastUpgrade = 0;
                    requiredFoodForNextUpgrade = getRequiredFoodForNextLevel(currentLevelIndex);
                    
                    if (gameSpeed > MIN_GAME_SPEED) {
                        gameSpeed = Math.max(MIN_GAME_SPEED, gameSpeed - SPEED_DECREASE_AMOUNT);
                        clearInterval(gameLoop);
                        gameLoop = setInterval(gameStep, gameSpeed);
                    }
                }
            }
        }

        function update() {
            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                foodEatenSinceLastUpgrade++;
                
                scoreElement.textContent = score;
                checkAndUpgradeSnakeHead();
                updateProgressDisplay();
                placeFood();
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            if (!isGameOver) {
                update();
                draw();
            }
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverOverlay.style.display = 'flex';
        }

        function restartGame() {
            initGame();
        }

        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
            e.preventDefault();
        });

        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (isGameOver) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const absDeltaX = Math.abs(deltaX);
            const absDeltaY = Math.abs(deltaY);

            if (Math.max(absDeltaX, absDeltaY) < 30) return;

            if (absDeltaX > absDeltaY) {
                if (deltaX > 0 && direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 };
                } else if (deltaX < 0 && direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 };
                }
            } else {
                if (deltaY > 0 && direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 };
                } else if (deltaY < 0 && direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 };
                }
            }
        }, { passive: false });

        window.addEventListener('resize', resizeCanvas);

        resizeCanvas();
        initGame();
    </script>
</body>
</html>
